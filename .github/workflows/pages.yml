name: Dashboard Auto-Update

on:
  schedule:
    # Run daily at 08:00 Kyiv time (UTC+3) = 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for updates
        run: |
          # The dashboard is generated by the local machine
          # This workflow just ensures GitHub Pages is active
          echo "Dashboard last updated: $(date)"
          ls -la index.html data.json 2>/dev/null || echo "Files will be pushed from local machine"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
